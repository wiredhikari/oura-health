# Default contact point — a webhook stub.
# Replace the URL with your own Slack/Discord/Pushover/ntfy endpoint and the
# alerts above will start delivering. Until you do, alerts still fire and show
# up in Grafana → Alerting → Active, they just don't leave the box.
apiVersion: 1

contactPoints:
  - orgId: 1
    name: oura-log
    receivers:
      - uid: oura-log-webhook
        type: webhook
        settings:
          url: https://example.invalid/oura-alerts
          httpMethod: POST
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: oura-log
    group_by: ['grafana_folder', 'alertname']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 12h
