worker_processes 1;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout  65;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
  gzip_min_length 1024;

  # Upstream Grafana
  upstream grafana {
    server grafana:3000;
  }

  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Landing page + static assets
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all Grafana paths so iframes are same-origin and no CORS dance.
    location /d/       { proxy_pass http://grafana; include /etc/nginx/proxy.conf; }
    location /d-solo/  { proxy_pass http://grafana; include /etc/nginx/proxy.conf; }
    location /api/     { proxy_pass http://grafana; include /etc/nginx/proxy.conf; }
    location /public/  { proxy_pass http://grafana; include /etc/nginx/proxy.conf; }
    location /avatar/  { proxy_pass http://grafana; include /etc/nginx/proxy.conf; }
    location /login    { proxy_pass http://grafana; include /etc/nginx/proxy.conf; }
    location /logout   { proxy_pass http://grafana; include /etc/nginx/proxy.conf; }

    # Grafana live (WebSocket) — needed for dashboard auto-refresh
    location /api/live/ {
      proxy_pass http://grafana;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }

    # Home page
    location / {
      try_files $uri $uri/ /index.html;
      add_header Cache-Control "no-cache";
    }

    # Health
    location = /healthz { default_type text/plain; return 200 "ok\n"; }
  }
}
