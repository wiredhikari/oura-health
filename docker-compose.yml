services:

  timescaledb:
    build: ./db
    container_name: oura-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Not exposed to host by default. Uncomment to connect with psql/DBeaver.
    # ports:
    #   - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 15

  sync:
    build: ./sync
    container_name: oura-sync
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      OURA_PAT:          ${OURA_PAT}
      POSTGRES_HOST:     timescaledb
      POSTGRES_PORT:     5432
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SYNC_SCHEDULE:     ${SYNC_SCHEDULE:-0 */3 * * *}
      BACKFILL_DAYS:     ${BACKFILL_DAYS:-730}

  grafana:
    build: ./grafana
    container_name: oura-grafana
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER:     ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_SERVER_ROOT_URL:         ${GF_SERVER_ROOT_URL:-http://localhost:3000}
      GF_USERS_DEFAULT_THEME:     "dark"
      GF_USERS_HOME_PAGE:         "/d/oura-today"
      # Allow embedding so the app's Trends tab can iframe dashboards.
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED:   "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE:  "Viewer"
      POSTGRES_HOST:               timescaledb
      POSTGRES_PORT:               5432
      POSTGRES_DB:                 ${POSTGRES_DB}
      POSTGRES_USER:               ${POSTGRES_USER}
      POSTGRES_PASSWORD:           ${POSTGRES_PASSWORD}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana

  api:
    build: ./api
    container_name: oura-api
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      POSTGRES_HOST:     timescaledb
      POSTGRES_PORT:     5432
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      APP_PASSCODE:      ${APP_PASSCODE}
      JWT_SECRET:        ${JWT_SECRET}
      JWT_TTL_DAYS:      ${JWT_TTL_DAYS:-30}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL:   ${ANTHROPIC_MODEL:-claude-opus-4-6}
      USER_NAME:         ${USER_NAME:-you}
      USER_AGE:          ${USER_AGE:-0}
      USER_TIMEZONE:     ${USER_TIMEZONE:-UTC}
      CORS_ORIGIN:       ${CORS_ORIGIN:-*}
      PORT:              "8000"
    ports:
      - "${API_PORT:-8000}:8000"

  app:
    build: ./app
    container_name: oura-app
    restart: unless-stopped
    depends_on:
      - api
    environment:
      API_BASE_URL:            http://api:8000
      NEXT_PUBLIC_GRAFANA_URL: ${NEXT_PUBLIC_GRAFANA_URL:-http://localhost:3000}
      PORT:                    "3001"
    ports:
      - "${APP_PORT:-3001}:3001"

  digest:
    # On Railway this is a separate cron service. Locally, use `make digest`
    # to fire it on demand: it runs once and exits.
    build: ./digest
    container_name: oura-digest
    profiles: ["manual"]
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      POSTGRES_HOST:     timescaledb
      POSTGRES_PORT:     5432
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL:   ${ANTHROPIC_MODEL:-claude-opus-4-6}
      RESEND_API_KEY:    ${RESEND_API_KEY:-}
      DIGEST_EMAIL_FROM: ${DIGEST_EMAIL_FROM:-digest@oura-health.local}
      DIGEST_EMAIL_TO:   ${DIGEST_EMAIL_TO:-}
      USER_NAME:         ${USER_NAME:-you}

volumes:
  postgres-data:
  grafana-data:
